name: GridGuard EEU Sync

on:
  schedule:
    - cron: '*/30 * * * *'   # Scraper: every 30 min
    - cron: '0 */2 * * *'    # Predictions: every 2 hours (handled by separate job below)
  workflow_dispatch:
    inputs:
      run_ai:
        description: 'Also run AI enhancement?'
        required: false
        default: 'false'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: EEU Scraper (every 30 min)
  # ─────────────────────────────────────────
  sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch dotenv @supabase/supabase-js

      - name: Run EEU Sync Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-eeu.js

  # ─────────────────────────────────────────
  # JOB 2: Rule-Based Predictions (every 2h)
  # Calls the serverless prediction cron endpoint.
  # ─────────────────────────────────────────
  predictions:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */2 * * *'
    steps:
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.VERCEL_URL }}" ]; then echo "❌ VERCEL_URL secret is missing!"; exit 1; fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then echo "❌ CRON_SECRET secret is missing!"; exit 1; fi

      - name: Normalize URL & Run Rule Engine
        run: |
          # Ensure URL starts with https:// and has no trailing slash
          URL="${{ secrets.VERCEL_URL }}"
          [[ $URL != http* ]] && URL="https://$URL"
          URL="${URL%/}"
          
          echo "🚀 Calling: $URL/api/cron/predictions"
          curl -f -i -X GET "$URL/api/cron/predictions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  # ─────────────────────────────────────────
  # JOB 3: AI Enhancement (Manual or Scheduled 6h)
  # ─────────────────────────────────────────
  ai_predictions:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_ai == 'true'
    steps:
      - name: Normalize URL & Run AI Enhancement
        run: |
          URL="${{ secrets.VERCEL_URL }}"
          [[ $URL != http* ]] && URL="https://$URL"
          URL="${URL%/}"
          
          echo "🤖 Calling AI Enhancement: $URL/api/cron/predictions?ai=true"
          curl -f -i -X GET "$URL/api/cron/predictions?ai=true" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
