name: 🗺️ GridGuard District Mapper

on:
  schedule:
    # Runs at 00:00 on the 1st of every 4th month (Jan, May, Sept)
    - cron: '0 0 1 */4 *'
  workflow_dispatch:
    # Allows manual runs to seed the DB immediately

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install node-fetch @supabase/supabase-js dotenv

      - name: 🚀 Run AI District Seeder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/seed-districts.js
